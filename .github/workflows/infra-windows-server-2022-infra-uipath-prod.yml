name: PROD - Windows Server 2022 Builds - UIPath

on:
  workflow_dispatch:

jobs:
    build-win2022-gui:
        uses:                   take-two/Workflows/.github/workflows/packer-vsphere.yml@master
        secrets:                inherit
        with:
            machine-prefix:     windows-server-2022-gui                     # The name of the artifact used in the content library, and what is used within the build image name
            template-dir:       infra/windows-server-2022                   # Tells packer where to find the template code
            install-type:       default_gui                                 # Tells packer which OS type you want to install
            environment:        prod_infra                                  # Tell GitHub Actions which environment to deploy this to, and which runners to use
