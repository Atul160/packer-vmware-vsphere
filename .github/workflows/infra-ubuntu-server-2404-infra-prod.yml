name: PROD - Ubuntu Server 24.04 (Noble) Builds

on:
  schedule:
    # Runs every 22nd day of the month at 2:00 AM UTC
    - cron: "0 2 22 * *"

  workflow_dispatch:

jobs:
  build-ubuntu-server-2404-clone:
    uses: take-two/Workflows/.github/workflows/packer-vsphere.yml@master
    secrets: inherit
    with:
      machine-prefix: ubuntu-server-2404 # The name of the artifact used in the content library, and what is used within the build image name
      template-dir: infra/linux/ubuntu-server # Tells packer where to find the template code
      install-type: noble-clone # Tells packer which OS type you want to install
      environment: prod_infra # Tell GitHub Actions which environment to deploy this to, and which runners to use
